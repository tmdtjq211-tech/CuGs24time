<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>말씀 실력 점검 시스템 (누적 암송법 전용)</title>

<script src="data.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsdiff/5.1.0/diff.min.js"></script>
<style>
:root{--primary:#1e3a8a;--secondary:#fbbf24;--bg-color:#f3f4f6;--card-bg:#ffffff;--text-main:#333333;--success:#10b981;--error:#ef4444;--correct-blue:#2563eb}
body{font-family:'Malgun Gothic',sans-serif;background-color:var(--bg-color);margin:0;padding:20px 10px;display:flex;justify-content:center;min-height:100vh}
.container{background:var(--card-bg);width:100%;max-width:800px;padding:30px;border-radius:12px;box-shadow:0 10px 25px rgba(0,0,0,.05);border-top:8px solid var(--primary);position:relative}
h2,h3{color:var(--primary);text-align:center}
h3{margin-top:0}
.btn{width:100%;padding:14px;background-color:var(--primary);color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer;transition:.2s;margin-top:10px}
.btn:hover{background-color:#1e40af}
.btn.btn-outline{background:0 0;color:var(--primary);border:2px solid var(--primary)}
.btn.btn-secondary{background:#6b7280; color:white;}
.btn.btn-secondary:hover{background:#4b5563;}
.btn.btn-danger{background:var(--error)}
.btn.btn-daily{background:linear-gradient(135deg, #f59e0b, #d97706); color:white; font-size:18px; margin-top:15px; box-shadow: 0 4px 6px rgba(0,0,0,0.2);}
.btn.btn-daily:hover{background:linear-gradient(135deg, #d97706, #b45309);}
.btn-sm{width:auto;padding:6px 12px;font-size:12px;margin-top:0}
.input-group{margin-bottom:15px; padding:15px; background:#f8fafc; border-radius:8px; border:1px solid #e2e8f0;}
.input-group label{display:block; margin-bottom:8px; font-weight:700; color:var(--primary)}
.question-box{background:#f8fafc;border:1px solid #e2e8f0;padding:20px;border-radius:10px;margin-bottom:20px}
.q-title{font-weight:700;color:var(--primary);margin-bottom:15px;border-bottom:2px solid var(--secondary);padding-bottom:5px}
textarea{width:100%;padding:12px;border:1px solid #ccc;border-radius:8px;min-height:80px;resize:vertical;box-sizing:border-box;font-size:15px;line-height:1.6;margin-bottom:5px}
textarea:focus{border-color:var(--primary);outline:0;box-shadow:0 0 0 3px rgba(30,58,138,.1)}
.score-board{background:#fffbeb;padding:20px;border-radius:10px;text-align:center;border:2px solid var(--secondary);margin-bottom:20px}
.score-num{font-size:36px;font-weight:700;color:var(--primary)}
.acc-badge{padding:3px 8px;border-radius:4px;color:#fff;font-size:12px;font-weight:700;margin-left:10px;display:inline-block}
.acc-high{background:var(--success)}
.acc-low{background:var(--error)}
.hidden{display:none!important}
.result-content-box{padding:12px;border-radius:8px;margin-top:5px;line-height:1.6;font-size:15px;word-break:break-all;overflow-wrap:break-word;white-space:pre-wrap;}

/* 대시보드 */
.dashboard {background: linear-gradient(135deg, #1e3a8a, #3b82f6); color: white; padding: 20px; border-radius: 10px; margin-bottom: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);}
.dash-title {font-size: 18px; font-weight: bold; margin-bottom: 10px; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 10px;}
.dash-dday {background: var(--secondary); color: #000; padding: 4px 10px; border-radius: 20px; font-size: 14px; white-space: nowrap;}
.dash-stats {display: flex; gap: 15px; margin-top: 10px;}
.dash-stat-box {background: rgba(255,255,255,0.2); padding: 10px; border-radius: 8px; flex: 1; text-align: center;}
.dash-stat-num {font-size: 24px; font-weight: bold; margin-top: 5px;}

/* 진도율 에너지바 (Progress Bar) */
.progress-wrapper {margin-top: 15px; background: rgba(0,0,0,0.3); border-radius: 15px; padding: 4px; position: relative; height: 22px;}
.progress-bar {height: 100%; background: linear-gradient(90deg, #fbbf24, #f59e0b); border-radius: 12px; width: 0%; transition: width 0.8s ease-in-out;}
.progress-text {position: absolute; width: 100%; text-align: center; top: 50%; left: 0; transform: translateY(-50%); font-size: 13px; font-weight: bold; color: #fff; text-shadow: 1px 1px 2px rgba(0,0,0,0.6); pointer-events: none;}

/* 직접 입력 폼 */
.range-inputs {display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 8px; margin-top: 15px;}
.range-part {display: flex; align-items: center; gap: 5px; white-space: nowrap;}
.num-input {width: 55px; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; text-align: center;}
.range-separator {font-weight: bold; font-size: 18px; color: #666; padding: 0 5px;}

/* 피드백 박스 */
.feedback-box {background: #f0fdf4; border: 2px solid #bbf7d0; padding: 20px; border-radius: 10px; margin-bottom: 20px;}
.feedback-title {font-weight: bold; color: #166534; font-size: 16px; margin-bottom: 10px;}
.feedback-list {color: #15803d; font-size: 14px; padding-left: 20px;}
.feedback-list li {margin-bottom: 5px;}

/* 히스토리 리스트 */
.history-item {background: #fff; border: 1px solid #ddd; padding: 15px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;}
.history-info {flex: 1;}
.history-score {font-size: 18px; font-weight: bold; color: var(--primary); width: 80px; text-align: right;}
</style>
</head>
<body>
<div class="container">
    
    <!-- 1. 메인 화면 -->
    <div id="screen-home">
        
        <!-- 대시보드 -->
        <div class="dashboard">
            <div class="dash-title">
                <span>🗓️ 6월 26일 목표 진도표 (7~12장)</span>
                <span class="dash-dday" id="dash-dday-badge">D-?</span>
            </div>
            <div style="font-size: 13px; opacity: 0.9;">출석 시험은 <b>무조건 처음(7장 1절)부터 오늘 새 진도까지</b> 누적되어 순서대로 출제됩니다.</div>
            
            <div class="dash-stats">
                <div class="dash-stat-box">
                    <div style="font-size:12px;">오늘 새롭게 외울 할당량</div>
                    <div class="dash-stat-num" id="dash-quota">0절</div>
                </div>
                <div class="dash-stat-box">
                    <div style="font-size:12px;">마스터(100점) 현황</div>
                    <div class="dash-stat-num" id="dash-mastered">0 / 0절</div>
                </div>
            </div>

            <!-- 에너지바 -->
            <div class="progress-wrapper">
                <div class="progress-bar" id="dash-progress-bar"></div>
                <div class="progress-text" id="dash-progress-text">전체 진도율 0%</div>
            </div>

            <!-- 출석체크용 시험 버튼 -->
            <button class="btn btn-daily" onclick="startDailyExam()" id="btn-daily-exam">🔥 처음부터 오늘 진도까지 누적 출석 시험</button>
        </div>

        <!-- 직접 범위 입력 폼 -->
        <div class="input-group">
            <div style="display:flex; flex-direction:column; gap:8px; margin-bottom:5px;">
                <span style="font-weight:700; color:var(--primary); font-size:16px;">출제 범위 직접 입력 (복습용)</span>
                <label style="font-size:12px; font-weight:normal; color:#666; display:flex; align-items:center; cursor:pointer;">
                    <input type="checkbox" id="restrict-ch-cb" checked style="margin-right:5px;" onchange="toggleRestriction()"> 
                    7~12장만 허용 (해제 시 전체 선택 가능)
                </label>
            </div>
            
            <div class="range-inputs">
                <div class="range-part">
                    <input type="number" id="start-ch" class="num-input" placeholder="0" min="1"> 장
                    <input type="number" id="start-v" class="num-input" placeholder="0" min="1"> 절
                </div>
                <span class="range-separator">~</span>
                <div class="range-part">
                    <input type="number" id="end-ch" class="num-input" placeholder="0" min="1"> 장
                    <input type="number" id="end-v" class="num-input" placeholder="0" min="1"> 절
                </div>
            </div>
            <p style="font-size:12px; color:#666; text-align:center; margin-top:15px; margin-bottom:0;" id="range-help-text">
                이 모드 또한 무작위 섞기 없이 <b>무조건 말씀 순서대로</b> 출제됩니다.
            </p>
        </div>
        
        <button class="btn" onclick="startCustomExam()">지정 범위 시험 시작</button> 
        <button class="btn btn-outline" onclick="showScreen('screen-history')" style="margin-top:20px;">내 기록 및 취약점 분석 보기</button>
        
        <div style="margin-top: 30px; padding-top: 20px; border-top: 1px dashed #ccc; font-size:13px;">
            <div style="display:flex; gap:10px;">
                <button class="btn btn-secondary btn-sm" style="flex:1;" onclick="exportData()">💾 기록 백업하기</button>
                <button class="btn btn-secondary btn-sm" style="flex:1;" onclick="document.getElementById('import-file').click()">📂 데이터 불러오기</button>
                <input type="file" id="import-file" style="display:none;" accept=".json" onchange="importData(event)">
            </div>
        </div>
    </div>

    <!-- 2. 시험 화면 -->
    <div id="screen-exam" class="hidden">
        <h2 id="exam-title">시험 응시</h2>
        <div id="exam-info" style="text-align:right;font-size:13px;color:#666;margin-bottom:10px;font-weight:700"></div>
        <div id="question-container"></div>
        <button class="btn" onclick="submitExam()" style="background:var(--success);font-size:18px;margin-top:30px">답안 제출 및 채점하기</button>
        <button class="btn btn-secondary" onclick="location.reload()" style="margin-top:10px;">시험 취소 (뒤로가기)</button>
    </div>

    <!-- 3. 결과 화면 -->
    <div id="screen-result" class="hidden">
        <h2>채점 결과</h2>
        <div class="score-board">
            <div id="res-mode-info" style="color:#666;font-size:14px;margin-bottom:5px"></div>
            <div class="score-num" id="res-score">0점</div>
        </div>
        
        <!-- AI 피드백 분석 박스 -->
        <div id="result-feedback" class="feedback-box"></div>

        <div id="result-details"></div>
        <div style="display:flex;gap:10px;margin-top:30px">
            <button class="btn btn-outline" onclick="location.reload()" style="margin-top:0">홈으로</button>
            <button class="btn" onclick="showScreen('screen-history')" style="margin-top:0">내 기록 보기</button> 
        </div>
    </div>

    <!-- 4. 기록(히스토리) 화면 -->
    <div id="screen-history" class="hidden">
        <h2>내 응시 기록</h2>
        <div id="history-list"></div>
        <button class="btn btn-secondary" onclick="location.reload()" style="margin-top:20px;">홈으로 돌아가기</button>
    </div>

    <!-- 5. 오답 노트 (기록 상세) 화면 -->
    <div id="screen-history-detail" class="hidden">
        <h2>상세 채점 내역</h2>
        <div id="history-detail-content"></div>
        <button class="btn btn-secondary" onclick="showScreen('screen-history')" style="margin-top:20px;">목록으로 돌아가기</button>
    </div>

</div>

<script>
// =========================================================================
// 전역 변수 및 초기화
// =========================================================================
const TARGET_DATE = new Date('2026-06-26T00:00:00');
const STORAGE_KEY = 'bibleExamHistoryV5'; 
let currentQuestions = [];
let currentModeText = ''; 
let todayQuotaCount = 0; 

const $ = (id) => document.getElementById(id);

function showScreen(screenId) {
    ["screen-home", "screen-exam", "screen-result", "screen-history", "screen-history-detail"].forEach(id => $(id).classList.add("hidden"));
    $(screenId).classList.remove("hidden");
    window.scrollTo(0, 0);
    
    if (screenId === 'screen-history') renderHistoryList();
    if (screenId === 'screen-home') updateDashboard();
}

window.onload = () => {
    if (typeof window.BIBLE === 'undefined') {
        alert("성경 데이터(data.js)를 불러오지 못했습니다. 동일한 폴더에 파일이 있는지 확인해주세요.");
        return;
    }
    
    $('start-ch').value = 7;
    $('start-v').value = 1;
    $('end-ch').value = 12;
    $('end-v').value = 1;
    
    updateDashboard();
};

window.toggleRestriction = () => {
    let isRestricted = $('restrict-ch-cb').checked;
    if (isRestricted) {
        $('range-help-text').innerHTML = "이 모드 또한 무작위 섞기 없이 <b>무조건 말씀 순서대로</b> 출제됩니다. <br>(기본적으로 7장~12장 제한됨)";
        $('range-help-text').style.color = "#666";
        if ($('start-ch').value < 7) $('start-ch').value = 7;
        if ($('end-ch').value > 12) $('end-ch').value = 12;
    } else {
        $('range-help-text').innerHTML = "✅ 제한 해제됨: 모든 장(Chapter)을 자유롭게 입력할 수 있으며 <b>순서대로</b> 출제됩니다.";
        $('range-help-text').style.color = "var(--success)";
    }
};

// =========================================================================
// 대시보드 및 마스터 관리 로직
// =========================================================================

function getDDay() {
    let today = new Date();
    today.setHours(0,0,0,0);
    let timeDiff = TARGET_DATE.getTime() - today.getTime();
    let days = Math.ceil(timeDiff / (1000 * 3600 * 24));
    return days < 0 ? 0 : days;
}

function getVersesInRange(sCh, sV, eCh, eV) {
    let verses = [];
    let chapters = Object.keys(window.BIBLE).map(Number).sort((a,b)=>a-b);
    
    for (let c of chapters) {
        if (c < sCh || c > eCh) continue;
        let vKeys = Object.keys(window.BIBLE[c]).map(Number).sort((a,b)=>a-b);
        for (let v of vKeys) {
            if (c === sCh && v < sV) continue;
            if (c === eCh && v > eV) continue;
            verses.push({ c: c, v: v, t: window.BIBLE[c][v], title: `${c}장 ${v}절` });
        }
    }
    return verses; // 말씀 순서 그대로 정렬되어 있음
}

function getTargetTotalVerses() {
    return getVersesInRange(7, 1, 12, 999).length;
}

function getMasteredTargetTitles() {
    let history = getHistory();
    let mastered = new Set();
    
    history.forEach(record => {
        record.details.forEach(det => {
            let match = det.title.match(/(\d+)장\s+(\d+)절/);
            if (match && det.score === 100) {
                let ch = parseInt(match[1]);
                if (ch >= 7 && ch <= 12) {
                    mastered.add(det.title);
                }
            }
        });
    });
    return mastered;
}

function updateDashboard() {
    let dDay = getDDay();
    let totalTarget = getTargetTotalVerses();
    let masteredSet = getMasteredTargetTitles();
    let masteredCount = masteredSet.size;
    let remainingVerses = totalTarget - masteredCount;
    
    let dailyQuota = dDay > 0 ? Math.ceil(remainingVerses / dDay) : remainingVerses;
    todayQuotaCount = dailyQuota;

    $('dash-dday-badge').innerText = dDay > 0 ? `D-${dDay}` : (dDay === 0 ? `D-Day` : `기한 종료`);
    $('dash-quota').innerText = `${dailyQuota}절`;
    $('dash-mastered').innerText = `${masteredCount} / ${totalTarget}절`;
    
    let progressPercent = totalTarget === 0 ? 0 : Math.round((masteredCount / totalTarget) * 100);
    $('dash-progress-bar').style.width = `${progressPercent}%`;
    $('dash-progress-text').innerText = `전체 진도율 ${progressPercent}%`;

    let btnDaily = $('btn-daily-exam');
    if(masteredCount >= totalTarget && totalTarget > 0) {
        $('dash-quota').innerText = `🎉 달성 완료`;
        $('dash-quota').style.color = "#fbbf24";
        btnDaily.innerText = "✨ 모든 목표 달성! 전체 100% 누적 복습 시험";
    } else {
        btnDaily.innerHTML = `🔥 처음부터 오늘 진도까지 누적 시험보기<br><span style="font-size:13px;font-weight:normal;">(오늘 새 진도 ${dailyQuota}절 포함)</span>`;
    }
}

// =========================================================================
// 시험 시작 로직 (누적 암송법 전용: 1절부터 마지막 진도까지)
// =========================================================================

window.startDailyExam = () => {
    let allTarget = getVersesInRange(7, 1, 12, 999);
    let masteredSet = getMasteredTargetTitles();
    
    // 마스터하지 못한 성구들 중 앞쪽에서 오늘 할당량(새 진도)만큼 추출
    let unmasteredVerses = allTarget.filter(v => !masteredSet.has(v.title));
    
    if (unmasteredVerses.length === 0) {
        // 100% 마스터한 경우 7~12장 전체를 순서대로
        currentQuestions = allTarget;
        currentModeText = `[전체 누적 복습] 7~12장 1절부터 끝까지 (총 ${allTarget.length}절)`;
    } else {
        let newCount = Math.min(todayQuotaCount, unmasteredVerses.length);
        let newVerses = unmasteredVerses.slice(0, newCount);
        
        // 오늘의 마지막 진도 성구가 몇 번째 인덱스인지 확인
        let lastVerseOfToday = newVerses[newVerses.length - 1];
        let lastIndex = allTarget.findIndex(v => v.title === lastVerseOfToday.title);
        
        // 7장 1절(인덱스 0)부터 마지막 진도까지 전부 잘라옴 (누적)
        currentQuestions = allTarget.slice(0, lastIndex + 1);
        
        currentModeText = `[누적 출석 시험] 처음(7장 1절)부터 ${lastVerseOfToday.title}까지 (총 ${currentQuestions.length}절 순서대로)`;
    }

    $('exam-info').innerText = currentModeText;
    renderQuestions();
    showScreen('screen-exam');
};

window.startCustomExam = () => {
    let sCh = parseInt($('start-ch').value);
    let sV = parseInt($('start-v').value);
    let eCh = parseInt($('end-ch').value);
    let eV = parseInt($('end-v').value);
    
    if (isNaN(sCh) || isNaN(sV) || isNaN(eCh) || isNaN(eV)) {
        return alert("장과 절을 정확히 숫자로 입력해주세요.");
    }
    
    let isRestricted = $('restrict-ch-cb').checked;
    if (isRestricted) {
        if (sCh < 7 || sCh > 12 || eCh < 7 || eCh > 12) {
            return alert("기본 모드에서는 7장~12장 안에서만 출제가 가능합니다. 다른 장을 원하시면 위의 체크박스를 해제하세요.");
        }
    }
    
    if (sCh > eCh || (sCh === eCh && sV > eV)) {
        return alert("시작 범위가 종료 범위보다 클 수 없습니다.");
    }

    // 지정한 범위를 말씀 순서대로 가져옴 (랜덤 섞기 없음)
    currentQuestions = getVersesInRange(sCh, sV, eCh, eV);
    
    if (currentQuestions.length === 0) {
        return alert("입력하신 범위에 해당하는 말씀 데이터가 없습니다.");
    }
    
    currentModeText = `[직접 입력 순차 시험] ${sCh}장 ${sV}절 ~ ${eCh}장 ${eV}절 (총 ${currentQuestions.length}절)`;
    $('exam-info').innerText = currentModeText;
    
    renderQuestions();
    showScreen('screen-exam');
};

function renderQuestions() {
    let qHtml = '';
    currentQuestions.forEach((q, idx) => {
        qHtml += `<div class="question-box">
            <div class="q-title">Q${idx + 1}. ${q.title}</div>
            <textarea class="ans verse-ans" id="ans-${idx}" placeholder="말씀을 입력하세요..."></textarea>
        </div>`;
    });
    $("question-container").innerHTML = qHtml;
}

function calculateScore(userAns, correctAns) {
    if(!userAns) return 0;
    let u = userAns.replace(/[\s\.\,\?\!\'\"0-9\(\)\[\]\|\~\-\>\:\<\&]/g, '');
    let c = correctAns.replace(/[\s\.\,\?\!\'\"0-9\(\)\[\]\|\~\-\>\:\<\&]/g, '');
    return (u === c && u.length > 0) ? 100 : 0;
}

// =========================================================================
// 채점, 피드백 분석 및 결과
// =========================================================================

function renderDiff(userAns, correctAns) {
    if (!userAns) return '<span style="color:#999;">(미입력)</span>';
    if (!correctAns) correctAns = "";
    if (typeof Diff === 'undefined') return userAns;

    let diffs = Diff.diffChars(correctAns, userAns);
    let html = '';
    let errUser = '';
    let errCorrect = '';

    function flushErrors() {
        if (errUser || errCorrect) {
            let cUser = errUser.replace(/[\s\.\,\?\!\'\"0-9\(\)\[\]\|\~\-\>\:\<\&]/g, '');
            let cCorrect = errCorrect.replace(/[\s\.\,\?\!\'\"0-9\(\)\[\]\|\~\-\>\:\<\&]/g, '');

            if (cUser.length === 0 && cCorrect.length === 0) {
                html += errCorrect;
            } else {
                if (cUser.length > 0) html += `<span class="diff-error" style="color:var(--error); text-decoration:underline; font-weight:700; background-color:#fee2e2; border-radius:4px;">${errUser}</span>`;
                if (cCorrect.length > 0) {
                    if (cUser.length > 0) {
                        html += `<span style="color:#059669; font-size:12px; font-weight:bold; background-color:#ecfdf5; border-radius:4px; border:1px solid #a7f3d0; margin-left:2px; margin-right:4px;">(정답:${errCorrect})</span>`;
                    } else {
                        html += `<span style="color:#d97706; background-color:#fffbeb; font-size:12px; font-weight:bold; border-radius:4px; border:1px solid #fef3c7; margin-right:4px;">[빠짐:${errCorrect}]</span>`;
                    }
                }
            }
            errUser = ''; errCorrect = '';
        }
    }

    diffs.forEach(part => {
        if (part.added) errUser += part.value; 
        else if (part.removed) errCorrect += part.value; 
        else { flushErrors(); html += `<span class="diff-correct" style="color:var(--correct-blue); font-weight:700;">${part.value}</span>`; }
    });
    flushErrors();

    return `<div style="line-height:2.0; font-size:15px;">${html}</div>`;
}

window.submitExam = () => {
    if (!confirm("제출하시겠습니까?")) return;
    
    let totalScore = 0;
    let recordDetails = [];
    let weakVerses = [];
    let weakChaptersCount = {};

    currentQuestions.forEach((q, idx) => {
        let userAns = $(`ans-${idx}`).value.trim();
        let score = calculateScore(userAns, q.t);
        totalScore += score;
        
        recordDetails.push({ title: q.title, correct: q.t, user: userAns, score: score });
        
        if (score < 100) {
            weakVerses.push(q.title);
            let ch = q.title.split('장')[0];
            weakChaptersCount[ch] = (weakChaptersCount[ch] || 0) + 1;
        }
    });

    let avgScore = Math.round(totalScore / currentQuestions.length);

    saveRecordToLocal(currentModeText, avgScore, recordDetails);
    
    $('res-score').innerText = `${avgScore}점`;
    $('res-mode-info').innerText = currentModeText;
    $('result-details').innerHTML = buildResultHTML(recordDetails);

    let feedbackHtml = `<div class="feedback-title">📊 누적 암송 결과 분석 가이드</div>`;
    
    if (weakVerses.length > 0) {
        let worstCh = Object.keys(weakChaptersCount).reduce((a, b) => weakChaptersCount[a] > weakChaptersCount[b] ? a : b);
        
        feedbackHtml += `<ul class="feedback-list">
            <li>총 ${currentQuestions.length}절을 누적해서 암송하시느라 수고하셨습니다. 이번엔 <b>${weakVerses.length}개</b>의 오답이 있었습니다.</li>
            <li><strong style="color:var(--error)">취약점 분석:</strong> 처음부터 누적해서 외우다 보니 <b>${worstCh}장</b> 부근에서 흐름이 끊기거나 오답이 많이 발생했습니다.</li>
            <li><strong style="color:var(--primary)">학습 추천:</strong> 홈 화면의 <b>'직접 입력'</b> 기능을 통해 <span style="background:#e0f2fe; padding:2px 6px; border-radius:4px;">오답이 난 성구 범위</span>만 짧게 지정해서 입에 붙을 때까지 순서대로 반복해 보세요.</li>
            <li style="margin-top:10px; color:#4b5563;">※ 틀린 성구들은 100점을 맞을 때까지 누적 진도의 '새 할당량' 취급을 받으며 계속해서 출제됩니다.</li>
        </ul>`;
    } else {
        feedbackHtml += `<ul class="feedback-list">
            <li>정말 대단하십니다! 1절부터 오늘 진도까지 <b>모든 말씀을 완벽하게 순서대로 암송</b>했습니다. 💯</li>
            <li>누적 암송법은 가장 확실하게 장기 기억으로 넘어가는 방법입니다. 진도율이 상승했습니다!</li>
            <li>내일 출석 시험을 누르시면, 오늘까지 외운 범위 뒤로 새로운 말씀이 덧붙여져서 또다시 처음부터 출제됩니다.</li>
        </ul>`;
    }
    $('result-feedback').innerHTML = feedbackHtml;

    showScreen("screen-result");
};

function buildResultHTML(details) {
    let html = '';
    details.forEach(det => {
        let badgeClass = det.score === 100 ? 'acc-high' : 'acc-low';
        let diffHtml = renderDiff(det.user, det.correct);
        
        html += `<div class="question-box" style="margin-bottom:15px; padding:15px;">
            <div style="font-weight:bold; font-size:14px; margin-bottom:10px; color:var(--primary);">
                ${det.title} <span class="acc-badge ${badgeClass}">${det.score === 100 ? '정답' : '오답'}</span>
            </div>
            <div style="font-size:13px; margin-bottom:8px;">
                <strong style="color:#666;">[작성 답안]</strong><br>
                <div class="result-content-box" style="background:#f9f9f9; border:1px solid #eee;">${diffHtml}</div>
            </div>
            <div style="font-size:13px;">
                <strong style="color:#10b981;">[실제 정답]</strong><br>
                <div class="result-content-box" style="background:#ecfdf5; border:1px solid #a7f3d0; color:#065f46;">${det.correct}</div>
            </div>
        </div>`;
    });
    return html;
}

// =========================================================================
// 로컬 스토리지 데이터 관리 및 백업
// =========================================================================
function getHistory() {
    let data = localStorage.getItem(STORAGE_KEY);
    let oldData = localStorage.getItem('bibleExamHistoryV4');
    if (!data && oldData) {
        localStorage.setItem(STORAGE_KEY, oldData);
        data = oldData;
    }
    return data ? JSON.parse(data) : [];
}

function saveRecordToLocal(modeText, score, details) {
    let history = getHistory();
    let newRecord = { id: Date.now(), date: new Date().toLocaleString(), modeText: modeText, score: score, details: details };
    history.unshift(newRecord);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
}

window.renderHistoryList = () => {
    let history = getHistory();
    let listHtml = '';
    
    if (history.length === 0) {
        listHtml = '<div style="text-align:center; padding:30px; color:#888;">응시 기록이 없습니다.</div>';
    } else {
        history.forEach(item => {
            listHtml += `<div class="history-item">
                <div class="history-info">
                    <div style="font-size:12px; color:#888;">${item.date}</div>
                    <div style="font-size:14px; font-weight:bold; color:#333; margin-top:3px;">${item.modeText}</div>
                </div>
                <div class="history-score">${item.score}점</div>
                <button class="btn btn-sm btn-outline" style="margin-left:10px;" onclick="viewHistoryDetail(${item.id})">상세보기</button>
                <button class="btn btn-sm btn-danger" style="margin-left:5px;" onclick="deleteRecord(${item.id})">삭제</button>
            </div>`;
        });
    }
    $('history-list').innerHTML = listHtml;
};

window.viewHistoryDetail = (id) => {
    let history = getHistory();
    let record = history.find(h => h.id === id);
    if(!record) return;
    
    let html = `<div style="background:var(--primary); color:white; padding:15px; border-radius:8px; margin-bottom:20px;">
        <h3 style="color:white; margin-bottom:5px;">${record.score}점</h3>
        <div style="font-size:13px; text-align:center;">${record.date} / ${record.modeText}</div>
    </div>`;
    
    html += buildResultHTML(record.details);
    $('history-detail-content').innerHTML = html;
    showScreen('screen-history-detail');
};

window.deleteRecord = (id) => {
    if(!confirm("이 기록을 삭제하시겠습니까? (삭제 시 마스터 현황 및 할당량에 영향을 줍니다)")) return;
    let history = getHistory();
    history = history.filter(h => h.id !== id);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
    renderHistoryList();
};

window.exportData = () => {
    let data = localStorage.getItem(STORAGE_KEY);
    if (!data || data === "[]") return alert("저장할 기록이 없습니다.");
    let blob = new Blob([data], { type: 'application/json' });
    let link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = `말씀시험_백업_${new Date().toISOString().slice(0, 10)}.json`;
    link.click();
};

window.importData = (event) => {
    let file = event.target.files[0];
    if (!file) return;
    let reader = new FileReader();
    reader.onload = function(e) {
        try {
            let importedData = JSON.parse(e.target.result);
            if (Array.isArray(importedData)) {
                if(confirm("기존 데이터에 덮어쓰시겠습니까?")) {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(importedData));
                    alert("성공적으로 복구되었습니다.");
                    location.reload();
                }
            } else alert("잘못된 파일 형식입니다.");
        } catch (err) { alert("파일을 읽는 중 오류가 발생했습니다."); }
    };
    reader.readAsText(file);
    event.target.value = ''; 
};
</script>
